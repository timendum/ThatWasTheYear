<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>That Was The Year</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="splash" class="screen active">
  <h1 class="splash-title">That Was The Year</h1>
  <div class="player-inputs-title">Players:</div>
  <div id="player-inputs">
    <input type="text" placeholder="Player 1" class="p-name">
    <input type="text" placeholder="Player 2" class="p-name">
  </div>
  <button onclick="addPlayerField()">+ Add Player</button>
  <div class="end-condition-title">End Condition:</div>
  <div id="end-condition-wrapper">
    <div id="end-condition">
      <label class="end-condition-option">
        <input type="radio" name="endCondition" value="infinite" checked>
        <span>Infinite (until songs run out)</span>
      </label>
      <label class="end-condition-option">
        <input type="radio" name="endCondition" value="turns">
        <span>Number of turns per player: <input type="number" id="turnsPerPlayer" min="1" value="10"></span>
      </label>
    </div>
  </div>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="game" class="screen">
  <div id="controls">
    <div class="controls-header">
      <h2 id="turn-indicator">Player's Turn</h2>
      <div id="round-display">Round 1</div>
      <button id="reset-btn" onclick="resetGame()" title="Start over" type="reset">↻</button>
    </div>
    <div id="audio-status"></div>
    <div id="action-bar">
        <button id="draw-btn" onclick="drawSong()">Play Random Song</button>
        <button id="replay-btn" style="display:none;" onclick="playPreview()">Replay ♫</button>
    </div>
    <div id="current-drag-item"></div>
  </div>
  <div id="players-container"></div>
</div>

<div id="preview-overlay">
  <div class="overlay-content">
    <h1 class="overlay-title">CORRECT!</h1>
    <div id="reveal-card"></div>
    <button onclick="closeOverlay()">Continue</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
