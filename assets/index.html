<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>That Was The Year</title>
  <style>
    :root {
      --bg: #121212;
      --card-bg: #181818;
      --accent: #1DB954;
      --text: #FFFFFF;
      --error: #e91e63;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .screen { display: none; width: 95%; max-width: 900px; text-align: center; padding: 20px; }
    .active { display: block; }

    input { background: #282828; border: 1px solid #333; color: white; padding: 12px; margin: 5px; border-radius: 4px; width: 200px; }
    button { background: var(--accent); border: none; padding: 12px 24px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.1s; margin: 5px; }
    button:hover { transform: scale(1.05); }

    #controls { position: sticky; top: 0; background: var(--bg); padding: 15px; width: 100%; z-index: 10; border-bottom: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

    .player-area { background: var(--card-bg); margin: 20px 0; padding: 20px; border-radius: 12px; border: 2px solid transparent; }
    .active-player-border { border-color: var(--accent); }

    .timeline { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; }

    .drop-zone { width: 40px; height: 130px; border: 2px dashed #444; border-radius: 8px; cursor: pointer; transition: 0.2s; }
    .drop-zone.waiting-for-input { border-color: var(--accent); background: rgba(29, 185, 84, 0.1); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    .drop-zone:hover { background: var(--accent); }

    .card { width: 100px; min-height: 140px; background: #282828; border-radius: 8px; padding: 8px; box-sizing: border-box; flex-shrink: 0; font-size: 0.65rem; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .card img { width: 100%; aspect-ratio: 1; border-radius: 4px; object-fit: cover; margin-bottom: 5px; }
    .card .year { font-weight: bold; font-size: 1rem; color: var(--accent); margin: 4px 0; }
    .card.mystery { background: linear-gradient(135deg, #1DB954 0%, #121212 100%); display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 2px solid var(--accent); }

    #preview-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    .overlay-content { background: var(--card-bg); padding: 30px; border-radius: 20px; text-align: center; border: 2px solid var(--accent); }
  </style>
</head>
<body>

<div id="splash" class="screen active">
  <h1 style="color: var(--accent); font-size: 3rem;">That Was The Year</h1>
  <div id="player-inputs">
    <label for="player1">
      <input type="text" placeholder="Player 1" class="p-name">
    </label>

    <label for="player2">
      <input type="text" placeholder="Player 2" class="p-name">
    </label>
    <div id="extra-players"></div>
  </div>
  <button onclick="addPlayerField()">+ Add Player</button>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="game" class="screen">
  <div id="controls">
    <div style="display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto;">
      <h2 id="turn-indicator">Player's Turn</h2>
      <div id="round-display" style="font-weight: bold; color: var(--accent);">Round 1</div>
    </div>
    <div id="audio-status" style="margin-top: 5px;"></div>
    <div id="action-bar">
        <button id="draw-btn" onclick="drawSong()">Play Random Song</button>
        <button id="replay-btn" style="display:none; background:#444;" onclick="playPreview()">Replay ♫</button>
    </div>
    <div id="current-drag-item" style="margin-top:15px; display: flex; justify-content: center; height: 150px;"></div>
  </div>
  <div id="players-container"></div>
</div>

<div id="preview-overlay">
  <div class="overlay-content">
    <h1 style="color: var(--accent);">CORRECT!</h1>
    <div id="reveal-card"></div>
    <button onclick="closeOverlay()">Continue</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
