<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4B0082"/>
      <stop offset="100%" stop-color="#00BFFF"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Record -->
  <circle cx="256" cy="256" r="170" fill="#111"/>
  <circle cx="256" cy="256" r="40" fill="#FFD700"/>

  <!-- Arrow -->
  <g stroke="#FFFFFF" stroke-width="10" stroke-linecap="round">
    <line x1="140" y1="256" x2="361" y2="256"/>
  </g>
  <polygon points="365,259 365,253 340,236 340,276" fill="#FFFFFF"/>

  <!-- Minimal ticks (no text for clarity at small sizes) -->
  <g stroke="#FFD700" stroke-width="6">
    <line x1="200" y1="240" x2="200" y2="272"/>
    <line x1="312" y1="240" x2="312" y2="272"/>
  </g>

  <!-- Music note -->
  <circle cx="300" cy="170" r="14" fill="#FFFFFF"/>
  <rect x="307" y="125" width="6" height="50" fill="#FFFFFF"/>
</svg>