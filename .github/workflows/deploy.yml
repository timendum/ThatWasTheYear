name: Deploy Build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.x"
      - run: deno install
      - run: deno task build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
  ghpages:
    name: "Deploy to Github Pages"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
  netlify:
    name: "Deploy to Netlify"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.x"
      - run: deno install
      - run: deno task build
      - name: Prepare zip
        run: cd dist && zip -r ../site.zip .
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          uvx --with netlify-python python -c "
          import os
          from netlify import NetlifyClient
          client = NetlifyClient(access_token=os.environ['NETLIFY_AUTH_TOKEN'])
          client.create_site_deploy(os.environ['NETLIFY_SITE_ID'], 'site.zip')
          "
