name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.x"
      - run: deno install
      - name: Type check
        if: always()
        run: deno task tc
      - name: Lint
        if: always()
        run: deno task lint
      - name: Format check
        if: always()
        run: deno task fmt:check
      - name: Validate songs.json
        if: always()
        run: deno task validate-songs
      - name: Run tests
        if: always()
        run: deno task test
