name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Type check
        run: bun run tc
      - name: Lint
        run: bun run lint
      - name: Format check
        run: bun run fmt:check
      - name: Validate songs.json
        run: bun run validate-songs
